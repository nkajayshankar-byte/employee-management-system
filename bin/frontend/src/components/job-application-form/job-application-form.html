<div class="application-modal-overlay">
  <div class="application-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div class="header-content">
        <h2>Apply for {{ jobTitle }}</h2>
        <p class="subtitle">Complete your application in 3 simple steps</p>
      </div>
      <button class="close-btn" (click)="close.emit()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="stepper">
      <div class="step" [class.active]="currentStep === 1" [class.completed]="currentStep > 1">
        <div class="step-icon"><i class="fas fa-file-upload"></i></div>
        <span>Upload</span>
      </div>
      <div class="step-line" [class.active]="currentStep > 1"></div>
      <div class="step" [class.active]="currentStep === 2" [class.completed]="currentStep > 2">
        <div class="step-icon"><i class="fas fa-user"></i></div>
        <span>Personal</span>
      </div>
      <div class="step-line" [class.active]="currentStep > 2"></div>
      <div class="step" [class.active]="currentStep === 3">
        <div class="step-icon"><i class="fas fa-briefcase"></i></div>
        <span>Professional</span>
      </div>
    </div>

    <div class="modal-body">
      <form [formGroup]="applicationForm" (ngSubmit)="submitApplication()">
        
        <!-- Step 1: Upload Resume -->
        <div class="step-content" *ngIf="currentStep === 1">
          <div class="upload-zone" [class.uploading]="uploading" [class.has-file]="!!resumeUrl">
            <input type="file" id="resumeUpload" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx" hidden>
            <label for="resumeUpload" class="upload-label">
              <div class="upload-icon-container">
                <i class="fas fa-cloud-upload-alt" *ngIf="!uploading && !resumeUrl"></i>
                <i class="fas fa-spinner fa-spin" *ngIf="uploading"></i>
                <i class="fas fa-check-circle success-icon" *ngIf="!uploading && resumeUrl"></i>
              </div>
              <div class="upload-text">
                <h3 *ngIf="!uploading && !resumeUrl">Upload your Resume</h3>
                <h3 *ngIf="!uploading && resumeUrl">Resume Uploaded Successfully!</h3>
                <p *ngIf="!uploading && !resumeUrl">Drag and drop or click to browse (PDF, DOCX)</p>
                <p *ngIf="!uploading && resumeUrl" class="file-name">{{ fileName }}</p>
              </div>
              <div class="btn-browse" *ngIf="!uploading && !resumeUrl">Browse Files</div>
            </label>
          </div>
          <div class="form-actions right">
             <button type="button" class="btn btn-primary" (click)="nextStep()" [disabled]="!resumeUrl">
                Review Details <i class="fas fa-arrow-right"></i>
             </button>
          </div>
        </div>

        <!-- Step 2: Personal Details -->
        <div class="step-content" *ngIf="currentStep === 2">
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name <span class="required">*</span></label>
              <input type="text" formControlName="name" class="form-control" placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
              <label>Email Address <span class="required">*</span></label>
              <input type="email" formControlName="email" class="form-control" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
              <label>Phone Number <span class="required">*</span></label>
              <input type="tel" formControlName="phone" class="form-control" placeholder="+1234567890">
            </div>
            
            <div class="form-group">
              <label>LinkedIn URL</label>
              <input type="url" formControlName="linkedInUrl" class="form-control" placeholder="https://linkedin.com/in/yourprofile">
            </div>

            <div class="form-group full-width">
              <label>GitHub URL</label>
              <input type="url" formControlName="githubUrl" class="form-control" placeholder="https://github.com/yourusername">
            </div>
          </div>
          <div class="form-actions space-between">
            <button type="button" class="btn btn-secondary" (click)="prevStep()">Back</button>
            <button type="button" class="btn btn-primary" (click)="nextStep()">Next Step <i class="fas fa-arrow-right"></i></button>
          </div>
        </div>

        <!-- Step 3: Professional Details -->
        <div class="step-content" *ngIf="currentStep === 3">
          <div class="form-group full-width">
            <label>Education / Degree</label>
            <input type="text" formControlName="education" class="form-control" placeholder="E.g. B.Tech in Computer Science">
          </div>

          <div class="form-group full-width">
            <label>Experience <span class="required">*</span></label>
            <textarea formControlName="experience" class="form-control" rows="3" placeholder="Briefly describe your relevant experience..."></textarea>
          </div>

          <div class="form-group full-width">
            <label>Key Skills <span class="required">*</span></label>
            <textarea formControlName="skills" class="form-control" rows="3" placeholder="E.g. Angular, Spring Boot, Java..."></textarea>
          </div>

          <div class="form-actions space-between">
            <button type="button" class="btn btn-secondary" (click)="prevStep()">Back</button>
            <button type="submit" class="btn btn-success" [disabled]="submitting || applicationForm.invalid || !resumeUrl">
              <i class="fas fa-spinner fa-spin" *ngIf="submitting"></i> 
              {{ submitting ? 'Submitting...' : 'Submit Application' }}
            </button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>
