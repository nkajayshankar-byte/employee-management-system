<div class="details-container">
  <div class="details-header">
    <button class="btn-mac-secondary sm" (click)="onCancel()">
      <i class="fa-solid fa-arrow-left"></i> Back to Directory
    </button>
  </div>

  <div class="details-content">
    <div class="profile-card">
      <div class="profile-sidebar">
        <div class="profile-image-container">
          <img [src]="imagePreview || 'assets/default-avatar.png'" 
               alt="Preview" 
               class="profile-image">
        </div>
        
        <div class="sidebar-info">
          <input type="file" 
                 accept="image/*"
                 (change)="onFileSelected($event)"
                 #fileInput hidden>
          <button type="button" 
                  class="btn-mac-secondary sm"
                  (click)="fileInput.click()">
            <i class="fa-solid fa-camera"></i> Select Photo
          </button>
          <p class="upload-hint" *ngIf="selectedFile">{{ selectedFile.name | slice:0:15 }}...</p>
          <span class="role-pill">New Member</span>
        </div>
      </div>

      <div class="profile-main">
        <div class="main-header">
          <h1>Add New Employee</h1>
          <p class="subtitle">Complete the organizational profile details below</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mac-form">
          <div class="details-section">
            <h3 class="section-title">Personal Information</h3>
            <div class="form-group required">
              <label>Full Name</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-user input-icon"></i>
                <input type="text"
                       class="mac-input"
                       [class.is-invalid]="isInvalid('name')"
                       formControlName="name"
                       placeholder="Enter full name">
              </div>
              <span class="error-text" *ngIf="isInvalid('name')">Name is required</span>
            </div>

            <div class="form-row">
              <div class="form-group required">
                <label>Email Address</label>
                <div class="input-wrapper">
                  <i class="fa-solid fa-envelope input-icon"></i>
                  <input type="email"
                         class="mac-input"
                         [class.is-invalid]="isInvalid('email')"
                         formControlName="email"
                         placeholder="email@company.com">
                </div>
                <span class="error-text" *ngIf="isInvalid('email')">Valid email required</span>
              </div>
              <div class="form-group required">
                <label>Mobile Number</label>
                <div class="input-wrapper">
                  <i class="fa-solid fa-phone input-icon"></i>
                  <input type="text"
                         class="mac-input"
                         [class.is-invalid]="isInvalid('mobile')"
                         formControlName="mobile"
                         placeholder="10-digit number">
                </div>
              </div>
            </div>
          </div>

          <div class="details-section">
            <h3 class="section-title">Professional Details</h3>
            <div class="form-row">
              <div class="form-group">
                <label>Office Location / Address</label>
                <div class="input-wrapper">
                  <i class="fa-solid fa-location-dot input-icon"></i>
                  <input type="text"
                         class="mac-input"
                         formControlName="address"
                         placeholder="City, Country">
                </div>
              </div>
              <div class="form-group">
                <label>Job Role</label>
                <div class="input-wrapper">
                  <i class="fa-solid fa-briefcase input-icon"></i>
                  <select class="mac-input" formControlName="jobRole">
                    <option value="">Select Job Role</option>
                    <option *ngFor="let role of availableJobRoles" [value]="role.title">
                      {{ role.title }}
                    </option>
                  </select>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label>Skills (comma separated)</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-list-check textarea-icon"></i>
                <textarea class="mac-input"
                          formControlName="skills"
                          placeholder="e.g., Design, Angular, Python"
                          rows="2"></textarea>
              </div>
            </div>

            <div class="form-group">
              <label>Organization Bio / Notes</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-building textarea-icon"></i>
                <textarea class="mac-input"
                          formControlName="companyInfo"
                          placeholder="Departmental context or internal notes"
                          rows="3"></textarea>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-mac-secondary" (click)="onCancel()">Cancel</button>
            <button type="submit" class="btn-mac" [disabled]="loading">
              <i class="fa-solid fa-save" *ngIf="!loading"></i>
              {{ loading ? 'Creating...' : 'Register Employee' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
