spring.application.name=EmployeeManagement
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=

# MySQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/employee_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=mysupersecretkeymysupersecretkeymysupersecretkeymysupersecretkey
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload.dir=uploads/

# Logging
# Clean Logging Configuration
logging.level.root=INFO
logging.level.com.EmployeeManagement=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.jdbc=INFO
logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate.SQL=OFF
spring.jpa.show-sql=false

server.error.include-message=always
server.error.include-binding-errors=always

# SendGrid Email Configuration
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=nkajayshankar@gmail.com

# Cloudinary Configuration
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

# Groq AI Configuration (Free Cloud AI)
spring.ai.openai.api-key=${GROQ_API_KEY:dummy-key-for-test-compatibility}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
# Google Gemini AI Configuration
spring.ai.google.genai.api-key=${GOOGLE_AI_GEMINI_API_KEY:dummy-key}
spring.ai.google.genai.project-id=unused
spring.ai.google.genai.location=us-central1
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
