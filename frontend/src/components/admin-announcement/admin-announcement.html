<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Schedule Company Announcement</h4>
    </div>
    <div class="card-body">
      <form (ngSubmit)="schedule()">
        
        <div class="mb-3">
          <label class="form-label fw-bold">Target Audience</label>
          <select class="form-select" name="audience" [(ngModel)]="announcement.targetAudience">
            <option *ngFor="let aud of audiences" [value]="aud">{{ aud }}</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Subject</label>
          <div class="input-group">
            <input type="text" class="form-control" name="subject" [(ngModel)]="announcement.subject" placeholder="e.g., Q3 Townhall Meeting" required>
            <button type="button" class="btn btn-outline-primary" (click)="generateAIContent()" [disabled]="isGenerating || !announcement.subject">
              <span *ngIf="isGenerating" class="spinner-border spinner-border-sm me-2"></span>
              <span *ngIf="!isGenerating">✨</span> Generate AI Content
            </button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Message Content</label>
          <textarea class="form-control" name="content" [(ngModel)]="announcement.content" rows="5" placeholder="Write your announcement here..." required></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Scheduled Time</label>
          <input type="datetime-local" class="form-control" name="scheduledTime" [(ngModel)]="announcement.scheduledTime" required>
          <small class="text-muted">Select the date and time when this announcement should be emailed.</small>
        </div>

        <div class="d-flex justify-content-end">
          <button type="submit" class="btn btn-primary" [disabled]="isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
            Schedule Announcement
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
