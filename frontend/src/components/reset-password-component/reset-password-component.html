<div class="reset-container">
  <div class="bg-circles">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>
  <div class="reset-wrapper">
    <div class="reset-header">
      <div class="lock-icon">
        <i class="fa-solid fa-key-skeleton"></i>
        <i class="fa-solid fa-lock-open" *ngIf="step === 2"></i>
        <i class="fa-solid fa-shield-check" *ngIf="step === 3"></i>
        <i class="fa-solid fa-envelope-open-text" *ngIf="step === 1"></i>
      </div>
      <h2>Reset Your Password</h2>
      <p *ngIf="step === 1">Enter your registered email to receive an OTP</p>
      <p *ngIf="step === 2">Enter the 6-digit OTP sent to your email</p>
      <p *ngIf="step === 3">Create your new secure password</p>
    </div>

    <!-- Step 1: Email Form -->
    <form *ngIf="step === 1" [formGroup]="emailForm" (ngSubmit)="sendOtp()">
      <div class="form-group">
        <label>Registered Email</label>
        <input type="email" class="form-control" [class.is-invalid]="isInvalid(emailForm, 'email')"
          formControlName="email" placeholder="your@email.com">
        <span class="error-text" *ngIf="isInvalid(emailForm, 'email')">Valid email ending in .com is required</span>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit" [disabled]="loading">
          {{ loading ? 'Sending OTP...' : 'Send OTP' }}
        </button>
        <button type="button" class="btn-cancel" (click)="onCancel()">
          Back to Login
        </button>
      </div>
    </form>

    <!-- Step 2: OTP Form -->
    <form *ngIf="step === 2" [formGroup]="otpForm" (ngSubmit)="verifyOtp()">
      <div class="form-group">
        <label>Enter OTP</label>
        <input type="text" class="form-control" [class.is-invalid]="isInvalid(otpForm, 'otp')" formControlName="otp"
          placeholder="123456" maxlength="6">
        <span class="error-text" *ngIf="isInvalid(otpForm, 'otp')">6-digit OTP is required</span>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit" [disabled]="loading">
          {{ loading ? 'Verifying...' : 'Verify OTP' }}
        </button>
        <button type="button" class="btn-cancel" (click)="onCancel()">
          Cancel
        </button>
      </div>
    </form>

    <!-- Step 3: Password Form -->
    <form *ngIf="step === 3" [formGroup]="passwordForm" (ngSubmit)="resetPassword()">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" class="form-control" [class.is-invalid]="isInvalid(passwordForm, 'newPassword')"
          formControlName="newPassword" placeholder="Min 6 characters">
        <span class="error-text" *ngIf="isInvalid(passwordForm, 'newPassword')">Password must be at least 6
          characters</span>
      </div>

      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" class="form-control"
          [class.is-invalid]="isInvalid(passwordForm, 'confirmPassword') || passwordForm.hasError('passwordMismatch')"
          formControlName="confirmPassword" placeholder="Confirm new password">
        <span class="error-text"
          *ngIf="isInvalid(passwordForm, 'confirmPassword') || passwordForm.hasError('passwordMismatch')">
          Passwords must match
        </span>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit" [disabled]="loading">
          {{ loading ? 'Updating...' : 'Update Password' }}
        </button>
        <button type="button" class="btn-cancel" (click)="onCancel()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
