<div class="application-modal-backdrop" (click)="close.emit()"></div>
<div class="application-modal glass-card">
  <div class="modal-header">
    <div class="title-group">
      <h3>Apply for {{ jobTitle }}</h3>
      <div class="step-indicator">Step {{ currentStep }} of {{ totalSteps }}</div>
    </div>
    <button class="close-btn" (click)="close.emit()"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" [style.width]="(currentStep / totalSteps) * 100 + '%'"></div>
  </div>

  <div class="modal-body">
    <form [formGroup]="applicationForm">
      <!-- Step 1: Personal Info -->
      <div class="step-content" *ngIf="currentStep === 1">
        <div class="form-group">
          <label>Full Name <span class="required">*</span></label>
          <input type="text" formControlName="name" class="mac-input" [class.error]="applicationForm.get('name')?.invalid && applicationForm.get('name')?.touched" placeholder="Enter your full name">
          <span class="error-text" *ngIf="applicationForm.get('name')?.invalid && applicationForm.get('name')?.touched">Name is required</span>
        </div>
        <div class="form-group">
          <label>Email Address <span class="required">*</span></label>
          <input type="email" formControlName="email" class="mac-input" [class.error]="applicationForm.get('email')?.invalid && applicationForm.get('email')?.touched" placeholder="name@example.com">
          <span class="error-text" *ngIf="applicationForm.get('email')?.invalid && applicationForm.get('email')?.touched">Valid email is required</span>
        </div>
        <div class="form-group">
          <label>Phone Number <span class="required">*</span></label>
          <input type="tel" formControlName="phone" class="mac-input" [class.error]="applicationForm.get('phone')?.invalid && applicationForm.get('phone')?.touched" placeholder="10-digit mobile number">
          <span class="error-text" *ngIf="applicationForm.get('phone')?.invalid && applicationForm.get('phone')?.touched">Phone number is required</span>
        </div>
      </div>

      <!-- Step 2: Professional Info -->
      <div class="step-content" *ngIf="currentStep === 2">
        <div class="form-group">
          <label>Key Skills <span class="required">*</span></label>
          <input type="text" formControlName="skills" class="mac-input" [class.error]="applicationForm.get('skills')?.invalid && applicationForm.get('skills')?.touched" placeholder="e.g. Java, Python, SQL">
          <span class="error-text" *ngIf="applicationForm.get('skills')?.invalid && applicationForm.get('skills')?.touched">Please list your top skills</span>
        </div>
        <div class="form-group">
          <label>Experience Summary <span class="required">*</span></label>
          <textarea formControlName="experience" class="mac-input" [class.error]="applicationForm.get('experience')?.invalid && applicationForm.get('experience')?.touched" placeholder="Briefly describe your background..." rows="5"></textarea>
          <span class="error-text" *ngIf="applicationForm.get('experience')?.invalid && applicationForm.get('experience')?.touched">Experience details are required</span>
        </div>
      </div>

      <!-- Step 3: Resume Upload -->
      <div class="step-content" *ngIf="currentStep === 3">
        <div class="step-header">
          <h4>Resume / CV</h4>
          <span class="required-badge">*</span>
        </div>
        <div class="upload-area" [class.uploaded]="resumeUrl" [class.error]="applicationForm.get('resume')?.invalid && applicationForm.get('resume')?.touched">
          <input type="file" id="resumeUpload" (change)="onFileSelected($event)" hidden>
          <label for="resumeUpload" class="upload-label">
            <i class="fa-solid" 
               [class.fa-cloud-arrow-up]="!uploading && !resumeUrl" 
               [class.fa-spinner]="uploading" 
               [class.fa-spin]="uploading" 
               [class.fa-check-circle]="resumeUrl && !uploading"></i>
            <span class="upload-text">{{ uploading ? 'Uploading...' : (resumeUrl ? 'Resume Uploaded' : 'Upload PDF or Word (Max 5MB)') }}</span>
            <span class="upload-subtext" *ngIf="!resumeUrl && !uploading">Click to browse files</span>
          </label>
        </div>
        <div class="validation-error" *ngIf="applicationForm.get('resume')?.invalid && applicationForm.get('resume')?.touched">
          Please upload your resume to continue.
        </div>
        <div class="file-success" *ngIf="resumeUrl && !uploading">
          <i class="fa-solid fa-file-circle-check"></i>
          <span>Document successfully attached to application.</span>
        </div>
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <button class="btn-mac-secondary" *ngIf="currentStep > 1" (click)="prevStep()">Back</button>
    <button class="btn-mac" *ngIf="currentStep < totalSteps" (click)="nextStep()">
      Next Step
    </button>
    <button class="btn-mac" *ngIf="currentStep === totalSteps" (click)="submitApplication()" [disabled]="uploading">
      {{ uploading ? 'Please wait...' : 'Submit Application' }}
    </button>
  </div>
</div>
